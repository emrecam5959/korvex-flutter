workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m1
    environment:
      ios_signing:
        provisioning_profiles:
          - name: default_profile
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch:
        - main
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
